version: '3.8'

services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: usc_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: info_clash
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgsql_data:/var/lib/postgresql/data
    networks:
      - usc_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usc_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=info_clash
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REVERB_HOST=0.0.0.0
    volumes:
      - ./backend:/app
    command: bash -c "composer install && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - db
    networks:
      - usc_network

  reverb:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usc_reverb
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=info_clash
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REVERB_HOST=0.0.0.0
    volumes:
      - ./backend:/app
    command: bash -c "composer install && php artisan reverb:start --host=0.0.0.0 --port=8080"
    depends_on:
      - db
    networks:
      - usc_network

  frontend:
    image: node:20-alpine
    container_name: usc_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - usc_network

networks:
  usc_network:
    driver: bridge

volumes:
  pgsql_data:
