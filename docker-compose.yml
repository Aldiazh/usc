services:
  postgres:
    image: postgres:17-alpine
    container_name: info-clash-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE:-info_clash}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-info_clash}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: info-clash-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: info-clash-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  reverb:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: info-clash-reverb
    restart: unless-stopped
    ports:
      - "${REVERB_SERVER_PORT:-8080}:8080"
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: php artisan reverb:start --host=0.0.0.0 --port=8080

volumes:
  pgdata:
    driver: local
  pgadmin-data:
    driver: local

